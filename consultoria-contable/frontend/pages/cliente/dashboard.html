<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Consultancy</title>

    <!--CSS-->
    <link rel="stylesheet" href="/consultoria-contable/frontend/css/style.css">
</head>
<body>
    
    <header class="navbar">
        <div class="logo"><img src="/consultoria-contable/frontend/css/img/logo.png" alt=""></div>

        <nav>
            <ul class="nav-links">
                <li><a href="#" class="active">Inicio</a></li>
                <li><a href="">Mis Declaraciones</a></li>
                <li><a href="">Documentos</a></li>
                <li><a href="">Pagos</a></li>
                <li><a href="">Tareas</a></li>
                <li><a href="">Reportes</a></li>
                <li><a href="">Perfil</a></li>
                <li><a href="">Ayuda</a></li>
            </ul>
        </nav>

    </header>

    <main class="dashboard-content">
        <h1>Bievenida de nuevo, Victoria</h1>

        <section class="summary-grid">
            <div class="card al-dia">
                <h3>Declaracion Mensual</h3>
                <p class="status-text">Al dia</p>
                <span class="period">Abril 2026</span>
            </div>

            <div class="card pendiente">
                <h3>Declaracion Anual</h3>
                <p class="status-text">Pendiente de documentos</p>
                <span class="period">Ejercicio 2025</span>
            </div>

            <div class="card proximo-pago">
                <h3>Proximo Pago</h3>
                <p class="amout">$1,250.00</p>
                <p class="date">Limite: 17 de Mayo</p>
            </div>
        </section>

        <div class="actions">
            <button class="btn-primary">Subir Documentos</button>
        </div>
    </main>
</body>
</html>
